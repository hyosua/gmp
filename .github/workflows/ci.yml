name: Continuous Integration & Security

on:
  push:
    branches: [ main, feat/** ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Job de scan de secrets (Gitleaks CLI)
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | tar -xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Run Gitleaks
        run: gitleaks detect --source=. --verbose --redact

  # 2. Job de SAST (njsscan)
  sast:
    name: SAST (njsscan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: nodejsscan scan
        id: njsscan
        uses: ajinabraham/njsscan-action@v0
        with:
          args: '.'

  # 3. Job de Build, Lint & SCA
  build-and-test:
    name: Build, Lint & SCA
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gmp
      AUTH_SECRET: dummy-secret-for-ci-build-only
      NEXTAUTH_URL: http://localhost:3000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: SCA (Software Composition Analysis)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check Lint
        run: npm run lint

      - name: Build project
        run: npm run build
